name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o stylua.zip
          unzip stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Check formatting
        run: stylua --check lua/

      - name: Check for backup files
        run: |
          found=$(find . -type f \( -name "*.bak" -o -name "*.old" -o -name "*.last" \) | head -20)
          if [ -n "$found" ]; then
            echo "❌ Backup files found:"
            echo "$found"
            exit 1
          fi
          echo "✅ No backup files found"

  syntax:
    name: Lua Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit

      - name: Validate Lua syntax (LuaJIT)
        run: |
          errors=0
          while IFS= read -r -d '' f; do
            if ! luajit -bl "$f" /dev/null 2>/dev/null; then
              echo "  ✗ $f"
              luajit -bl "$f" /dev/null 2>&1 | sed 's/^/    /'
              errors=$((errors + 1))
            fi
          done < <(find lua -name '*.lua' -print0)

          if [ $errors -gt 0 ]; then
            echo "❌ $errors Lua syntax error(s)"
            exit 1
          fi
          echo "✅ All Lua files have valid syntax"

      - name: Install luacheck
        run: |
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Luacheck analysis
        run: |
          luacheck lua/ \
            --no-color \
            --codes \
            --no-max-line-length \
            --globals vim \
            --only 0 \
            --no-unused
          echo "✅ Luacheck passed"

  startup:
    name: Neovim Startup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/v0.10.4/nvim-linux-x86_64.tar.gz -o nvim.tar.gz
          tar xzf nvim.tar.gz
          sudo cp -r nvim-linux-x86_64/* /usr/local/

      - name: Test Neovim startup
        run: |
          export HOME=$(mktemp -d)
          mkdir -p $HOME/.config
          ln -s $GITHUB_WORKSPACE $HOME/.config/nvim
          timeout 30 nvim --headless -c "lua print('✅ Neovim loaded successfully')" -c "quitall" 2>&1
          echo "✅ Startup test passed"

      - name: Test version command
        run: |
          export HOME=$(mktemp -d)
          mkdir -p $HOME/.config
          ln -s $GITHUB_WORKSPACE $HOME/.config/nvim
          VERSION=$(timeout 30 nvim --headless -c "lua print(require('core.version').string())" -c "quitall" 2>&1 | tail -1)
          echo "✅ Version: ${VERSION}"

  version:
    name: Version Consistency
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version.lua exists
        run: |
          if [ ! -f "lua/core/version.lua" ]; then
            echo "❌ lua/core/version.lua not found"
            exit 1
          fi
          echo "✅ version.lua exists"

      - name: Verify tag matches version.lua
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"

          MAJOR=$(grep -E '^\s+major\s*=' lua/core/version.lua | head -1 | grep -oE '[0-9]+')
          MINOR=$(grep -E '^\s+minor\s*=' lua/core/version.lua | head -1 | grep -oE '[0-9]+')
          PATCH=$(grep -E '^\s+patch\s*=' lua/core/version.lua | head -1 | grep -oE '[0-9]+')

          if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ -z "$PATCH" ]; then
            echo "❌ Failed to parse version fields from lua/core/version.lua"
            grep -E '^\s+(major|minor|patch)\s*=' lua/core/version.lua
            exit 1
          fi

          LUA_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "  Tag:          v${TAG}"
          echo "  version.lua:  ${LUA_VERSION}"

          if [ "$TAG" != "$LUA_VERSION" ]; then
            echo "❌ Tag v${TAG} does not match version.lua (${LUA_VERSION})"
            exit 1
          fi
          echo "✅ Tag v${TAG} matches version.lua (${LUA_VERSION})"

      - name: Verify CHANGELOG entry
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -f "CHANGELOG.md" ]; then
            if grep -q "\[${TAG}\]" CHANGELOG.md; then
              echo "✅ CHANGELOG.md contains [${TAG}]"
            else
              echo "⚠️  CHANGELOG.md missing [${TAG}] entry (warning only)"
            fi
          else
            echo "⚠️  CHANGELOG.md not found (warning only)"
          fi

  release:
    name: Create Release
    needs: [lint, syntax, startup, version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          V_MAJOR=$(grep -E '^\s+major\s*=' lua/core/version.lua | head -1 | grep -oE '[0-9]+')
          V_MINOR=$(grep -E '^\s+minor\s*=' lua/core/version.lua | head -1 | grep -oE '[0-9]+')
          V_PATCH=$(grep -E '^\s+patch\s*=' lua/core/version.lua | head -1 | grep -oE '[0-9]+')
          LUA_VERSION="${V_MAJOR}.${V_MINOR}.${V_PATCH}"

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGES=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s" --no-merges)
            COMPARE="**Full Changelog**: https://github.com/ca971/nvim-enterprise/compare/${PREVIOUS_TAG}...${TAG}"
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
            COMPARE=""
          fi

          CHANGELOG_SECTION=""
          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG_SECTION=$(awk "/^## \[${LUA_VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          fi

          LUA_FILES=$(find lua -name "*.lua" | wc -l | tr -d ' ')
          LANG_COUNT=$(find lua/langs -name "*.lua" ! -name "_template.lua" ! -name "init.lua" | wc -l | tr -d ' ')
          PLUGIN_DIRS=$(find lua/plugins -mindepth 2 -name "*.lua" ! -name "init.lua" | wc -l | tr -d ' ')

          {
            echo '<div align="center">'
            echo ""
            echo "# <img src=\"https://neovim.io/logos/neovim-mark.svg\" width=\"28\" height=\"28\" /> NvimEnterprise ${TAG}"
            echo ""
            echo "**Enterprise-Grade · Multi-User · Cross-Platform · Ultra-Modular**"
            echo ""
            echo '</div>'
            echo ""
            echo "---"
            echo ""
            echo "## ✨ Highlights"
            echo ""
            echo "| Feature | Details |"
            echo "|---|---|"
            echo "| 🏗️ **Architecture** | OOP class system with inheritance and mixins |"
            echo "| 👥 **Multi-User** | Isolated namespaces — hot-swap at runtime |"
            echo "| 🌍 **Languages** | ${LANG_COUNT}+ language modules (plug-and-play) |"
            echo "| 🔌 **Plugins** | ${PLUGIN_DIRS}+ pre-configured plugins (lazy-loaded) |"
            echo "| 🤖 **AI** | 4 integrations — Copilot · Avante · CodeCompanion · Continue |"
            echo "| 🌐 **Platform** | macOS · Linux · Windows · WSL · BSD · Docker · SSH |"
            echo "| 🛡️ **Security** | Sandbox loading, path validation, zero telemetry |"
            echo "| ⚡ **Performance** | Startup < 50ms — fully lazy-loaded |"
            echo "| 📋 **Versioning** | SemVer ${LUA_VERSION} — CHANGELOG + automated releases |"
            echo ""
            echo "---"

            if [ -n "$CHANGELOG_SECTION" ]; then
              echo ""
              echo "## 📋 What's Changed"
              echo ""
              echo "$CHANGELOG_SECTION"
              echo ""
              echo "---"
            fi

            echo ""
            echo "## 📋 Commits"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Quick Install"
            echo ""
            echo "**macOS & Linux:**"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/ca971/nvim-enterprise/main/install.sh | bash"
            echo '```'
            echo ""
            echo "**Windows (PowerShell):**"
            echo '```powershell'
            echo 'git clone https://github.com/ca971/nvim-enterprise.git "$env:LOCALAPPDATA\nvim"'
            echo "nvim"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "## 📊 Stats"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Lua files | ${LUA_FILES} |"
            echo "| Language modules | ${LANG_COUNT}+ |"
            echo "| Plugin configs | ${PLUGIN_DIRS}+ |"
            echo "| Startup time | < 50ms |"
            echo "| Neovim required | ≥ 0.10.0 |"
            echo ""
            echo "---"
            echo ""
            echo "## 🔗 Links"
            echo ""
            echo "- 📖 [Documentation](https://github.com/ca971/nvim-enterprise#readme)"
            echo "- 📋 [CHANGELOG](https://github.com/ca971/nvim-enterprise/blob/main/CHANGELOG.md)"
            echo "- 🐛 [Report a Bug](https://github.com/ca971/nvim-enterprise/issues/new)"
            echo "- 🤝 [Contributing](https://github.com/ca971/nvim-enterprise/blob/main/CONTRIBUTING.md)"
            echo ""
            if [ -n "$COMPARE" ]; then
              echo "$COMPARE"
              echo ""
            fi
            echo "---"
            echo ""
            echo '<div align="center">'
            echo ""
            echo "**Crafted with ❤️ by [ca971](https://github.com/ca971) — for dev teams and enterprise.**"
            echo ""
            echo '</div>'
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.tag }} — NvimEnterprise"
          body_path: /tmp/release-notes.md
          make_latest: true
