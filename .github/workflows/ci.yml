name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o stylua.zip
          unzip stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Check formatting
        run: stylua --check lua/

      - name: Check for backup files
        run: |
          found=$(find . -type f \( -name "*.bak" -o -name "*.old" -o -name "*.last" \) | head -20)
          if [ -n "$found" ]; then
            echo "❌ Backup files found:"
            echo "$found"
            exit 1
          fi
          echo "✅ No backup files found"

  startup:
    name: Neovim Startup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/download/v0.10.4/nvim-linux-x86_64.tar.gz -o nvim.tar.gz
          tar xzf nvim.tar.gz
          sudo cp -r nvim-linux-x86_64/* /usr/local/

      - name: Validate Lua syntax
        run: |
          errors=0
          while IFS= read -r file; do
            output=$(nvim --headless --clean -c "
              local ok, err = loadfile('$file')
              if not ok then
                io.stderr:write(err .. '\n')
                vim.cmd('cquit 1')
              else
                vim.cmd('quitall')
              end
            " 2>&1)
            if [ $? -ne 0 ]; then
              echo "❌ $file"
              echo "$output"
              errors=$((errors + 1))
            fi
          done < <(find lua -name "*.lua")
          if [ "$errors" -gt 0 ]; then
            echo "❌ $errors file(s) with syntax errors"
            exit 1
          fi
          echo "✅ All Lua files have valid syntax"

      - name: Test Neovim startup
        run: |
          export HOME=$(mktemp -d)
          mkdir -p $HOME/.config
          ln -s $GITHUB_WORKSPACE $HOME/.config/nvim
          timeout 30 nvim --headless -c "quitall" 2>&1 || true
          echo "✅ Neovim startup test completed"

  release:
    name: Create Release
    needs: [lint, startup]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
