# Pre-commit Checks & Rules
#
# ------------------------------------------------------------------------------------------------------
# CHECK / RULE                    WHY
# ------------------------------------------------------------------------------------------------------
# stylua	                        Lua Formatting — The core of the project.
# ------------------------------------------------------------------------------------------------------
# lua-syntax	                    Syntax Errors = Broken plugin for the end-user
# ------------------------------------------------------------------------------------------------------
# shellcheck	                    Validates Install, Release, and CI scripts.
# ------------------------------------------------------------------------------------------------------
# json-syntax	                    Guards lazy-lock.json, coc-settings, and snippets.
# ------------------------------------------------------------------------------------------------------
# yamllint	                      For .github/workflows and config files.
# ------------------------------------------------------------------------------------------------------
# markdownlint	                  README, docs, and CHANGELOG — The project's storefront.
# ------------------------------------------------------------------------------------------------------
# 
# ------------------------------------------------------------------------------------------------------
# strict_warnings	                Public Repo — Commits must be exemplary.
# ------------------------------------------------------------------------------------------------------
# debug_markers_block	            A forgotten print() in a plugin = a visible bug for users.
# ------------------------------------------------------------------------------------------------------
# run_tests = false	              No automated Lua test suite (e.g., vstack/plenary) currently active.
# ------------------------------------------------------------------------------------------------------
# max_file_size = 1MB	            Text only — a 1MB .lua file is a red flag. 
# ------------------------------------------------------------------------------------------------------

[commit-msg]
subject_max_length = 72
body_max_length = 100
strict_warnings = true

[pre-commit]
max_file_size = 1048576
debug_markers_block = true
trailing_ws_block = true
enable = stylua,lua-syntax,shellcheck,json-syntax,yamllint,markdownlint

[pre-push]
protected_branches = main
allow_wip = false
run_tests = false
enable = stylua,lua-syntax,shellcheck

[post-merge]
show_stat = true
max_files_shown = 15
